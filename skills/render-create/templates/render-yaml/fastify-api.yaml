services:
  - type: web
    runtime: node
    name: {{PROJECT_NAME}}
    repo: https://github.com/YOUR_ORG/{{PROJECT_NAME}}
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        fromDatabase:
          name: {{PROJECT_NAME}}-db
          property: connectionString

databases:
  - name: {{PROJECT_NAME}}-db
    plan: free
