services:
  - type: web
    runtime: static
    name: {{PROJECT_NAME}}
    repo: https://github.com/YOUR_ORG/{{PROJECT_NAME}}
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_ENV
        value: production
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
